[build]
  publish = "."

[build.environment]
  SECRETS_SCAN_OMIT_PATHS = "config.js"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/"
  to   = "/cliente.html"
  status = 200

[[redirects]]
  from = "/agendar"
  to   = "/cliente.html"
  status = 200

[[redirects]]
  from = "/agendar/*"
  to   = "/cliente.html?b=:splat"
  status = 200

[[redirects]]
  from = "/barbeiro"
  to   = "/barbeiro.html"
  status = 200

[[redirects]]
  from = "/admin"
  to   = "/admin.html"
  status = 200

[[redirects]]
  from = "/painel"
  to   = "/painel-chamada.html"
  status = 200

[[redirects]]
  from = "/demo"
  to   = "/demo.html"
  status = 200

[[redirects]]
  from = "/termos"
  to   = "/docs/termos-de-uso.html"
  status = 200

[[redirects]]
  from = "/privacidade"
  to   = "/docs/politica-privacidade.html"
  status = 200
